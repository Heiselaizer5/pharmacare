{% extends "base.html" %}
{% block title %}Edit User - PharmaCare{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="{{ url_for('users') }}" class="p-2 rounded-xl bg-gray-900/50 border border-white/10 text-gray-400 hover:text-white transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <div>
            <h1 class="text-3xl font-bold text-white">Edit User</h1>
            <p class="text-gray-400 mt-1">Update {{ user['full_name'] }}'s account</p>
        </div>
    </div>

    <form method="POST" class="bg-gray-900/50 border border-white/5 rounded-2xl p-8 space-y-6">
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Full Name *</label>
            <input type="text" name="full_name" required value="{{ user['full_name'] }}"
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Phone Number</label>
            <input type="tel" name="phone" value="{{ user.get('phone', '') or '' }}" placeholder="+255 712 345 678"
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Username</label>
            <input type="text" value="{{ user['username'] }}" disabled
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-gray-500 cursor-not-allowed">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">New Password (leave blank to keep current)</label>
            <input type="password" name="password" minlength="6" placeholder="Enter new password"
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Role *</label>
            <select name="role"
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
                <option value="pharmacist" class="bg-gray-900" {% if user['role'] == 'pharmacist' %}selected{% endif %}>Pharmacist</option>
                <option value="admin" class="bg-gray-900" {% if user['role'] == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Branch *</label>
            <select name="branch_id"
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
                {% for b in branches %}
                <option value="{{ b['id'] }}" class="bg-gray-900" {% if user.get('branch_id') == b['id'] %}selected{% endif %}>{{ b['name'] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex items-center justify-end gap-3 pt-4">
            <a href="{{ url_for('users') }}" class="px-6 py-3 rounded-xl border border-white/10 text-gray-400 hover:text-white hover:bg-white/5 transition font-medium">Cancel</a>
            <button type="submit" class="px-8 py-3 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-500/25 transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
                Update User
            </button>
        </div>
    </form>
</div>
{% endblock %}
