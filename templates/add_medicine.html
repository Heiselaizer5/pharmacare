{% extends "base.html" %}
{% block title %}Add Medicine - PharmaCare{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="{{ url_for('medicines') }}" class="p-2 rounded-xl bg-gray-900/50 border border-white/10 text-gray-400 hover:text-white transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <div>
            <h1 class="text-3xl font-bold text-white">Add New Medicine</h1>
            <p class="text-gray-400 mt-1">Fill in the details below</p>
        </div>
    </div>

    <form method="POST" class="bg-gray-900/50 border border-white/5 rounded-2xl p-8 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Medicine Name *</label>
                <input type="text" name="name" required placeholder="e.g. Paracetamol 500mg"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Category</label>
                <select name="category"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
                    <option value="" class="bg-gray-900">Select category</option>
                    <option value="Painkiller" class="bg-gray-900">Painkiller</option>
                    <option value="Antibiotic" class="bg-gray-900">Antibiotic</option>
                    <option value="Antihistamine" class="bg-gray-900">Antihistamine</option>
                    <option value="Antacid" class="bg-gray-900">Antacid</option>
                    <option value="Antidiabetic" class="bg-gray-900">Antidiabetic</option>
                    <option value="Supplement" class="bg-gray-900">Supplement</option>
                    <option value="Cough Medicine" class="bg-gray-900">Cough Medicine</option>
                    <option value="Hydration" class="bg-gray-900">Hydration</option>
                    <option value="Other" class="bg-gray-900">Other</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Expiry Date *</label>
                <input type="date" name="expiry_date" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Purchase Date</label>
                <input type="date" name="purchase_date"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Buying Price (TSH) *</label>
                <input type="number" name="buying_price" required min="0" step="any" placeholder="0"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Selling Price (TSH) *</label>
                <input type="number" name="selling_price" required min="0" step="any" placeholder="0"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Stock Quantity *</label>
                <input type="number" name="stock_qty" required min="0" placeholder="0"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Description</label>
                <input type="text" name="description" placeholder="Brief description"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
            </div>
        </div>
        <div class="flex items-center justify-end gap-3 pt-4">
            <a href="{{ url_for('medicines') }}" class="px-6 py-3 rounded-xl border border-white/10 text-gray-400 hover:text-white hover:bg-white/5 transition font-medium">Cancel</a>
            <button type="submit" class="px-8 py-3 bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white font-bold rounded-xl shadow-lg shadow-primary-500/25 transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
                Save Medicine
            </button>
        </div>
    </form>
</div>
{% endblock %}
