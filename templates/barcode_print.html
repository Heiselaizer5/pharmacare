<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode - {{ medicine['name'] }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: white; }
        @media print {
            .no-print { display: none !important; }
            .barcode-label { break-inside: avoid; }
        }
    </style>
</head>
<body class="p-8">
    <!-- Print Controls -->
    <div class="no-print mb-6 flex items-center justify-between">
        <a href="{{ url_for('medicines') }}" class="inline-flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-semibold text-sm transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Back to Medicines
        </a>
        <div class="flex gap-3">
            <label class="text-sm font-medium text-gray-600">Copies:</label>
            <input type="number" id="copies" value="4" min="1" max="50" class="w-20 px-3 py-1 border rounded-lg text-center">
            <button onclick="printBarcodes()" class="px-5 py-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow transition-all text-sm">
                Print Barcodes
            </button>
        </div>
    </div>

    <!-- Barcode Grid -->
    <div id="barcodeSheet" class="grid grid-cols-3 gap-6">
        <div class="barcode-label border border-gray-300 rounded-lg p-4 text-center">
            <div class="mb-2">{{ medicine['name'] }}</div>
            <div class="text-xs text-gray-500 mb-2">{{ medicine['category'] or '' }}</div>
            <div class="my-2" id="barcode-target"></div>
            <div class="text-xs font-mono text-gray-600 mt-1">{{ medicine['barcode'] }}</div>
            <div class="text-sm font-bold text-emerald-600 mt-1">TSH {{ "{:,.0f}".format(medicine['price']) }}</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            JsBarcode('#barcode-target', '{{ medicine['barcode'] }}', {
                format: 'CODE128',
                width: 2,
                height: 50,
                displayValue: false,
                margin: 5
            });

            // Replicate for print
            const container = document.getElementById('barcodeSheet');
            const original = container.innerHTML;
            const numCopies = parseInt(document.getElementById('copies').value) - 1;
            for (let i = 0; i < numCopies; i++) {
                container.innerHTML += original;
            }
            // Re-render all barcodes
            document.querySelectorAll('#barcode-target, .barcode-label svg').forEach(function(el) {
                if (!el.classList.contains('barcode-rendered')) {
                    try {
                        JsBarcode(el, '{{ medicine['barcode'] }}', {
                            format: 'CODE128', width: 2, height: 50, displayValue: false, margin: 5
                        });
                        el.classList.add('barcode-rendered');
                    } catch(e) {}
                }
            });
        });

        function printBarcodes() {
            window.print();
        }
    </script>
</body>
</html>
